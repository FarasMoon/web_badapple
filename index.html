<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bad jinsei</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="c"></canvas>
<div class="overlay" id="overlay">
  <div class="title">一键badapple</div>
  <div class="btn-row">
    <button class="play-btn" id="btn-play">开始播放</button>
  </div>
  <div class="btn-row">
    <button class="small-btn" id="btn-switch">换白区图</button>
    <button class="small-btn" id="btn-switch2">换黑区图</button>
    <button class="small-btn" id="btn-reset">恢复默认</button>
  </div>
  <div class="btn-row">
    <button class="small-btn" id="btn-block">贪心算法</button>
  </div>
  <span class="status" id="status"></span>
</div>
<div class="hint" id="hint"></div>
<input type="file" id="file-input" accept="image/*" style="display:none">
<input type="file" id="file-input2" accept="image/*" style="display:none">
<video id="v" src="badapple.mp4" playsinline style="display:none"></video>

<div class="crop-overlay" id="crop-overlay">
  <canvas id="crop-canvas"></canvas>
  <div class="crop-hint">拖动移动 / 滚轮缩放</div>
  <div class="crop-btns">
    <button class="small-btn" id="crop-cancel">取消</button>
    <button class="small-btn on" id="crop-confirm">确认</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
